apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization


resources:
  - stack-namespace.yaml

helmGlobals:
  chartHome: ../../charts

helmCharts:
  - name: kube-prometheus-stack
    releaseName: kube-prometheus-stack
    valuesFile: stack-values.yaml
    namespace: monitoring
    includeCRDs: true
