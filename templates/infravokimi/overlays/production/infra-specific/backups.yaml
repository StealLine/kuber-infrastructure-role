apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-auth
  labels:
    app: backup-auth
    tier: backup
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  schedule: "0 2 * * *"   # 02:00 UTC daily
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: backup-auth
        spec:
          enableServiceLinks: false
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: eeshugerman/postgres-backup-s3:16
              env:
                - name: SCHEDULE
                  value: "@daily"
                - name: BACKUP_KEEP_DAYS
                  value: "7"
                - name: S3_ENDPOINT
                  valueFrom:
                    configMapKeyRef:
                      name: common-config
                      key: S3__ServiceURL
                - name: S3_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: common-secrets
                      key: S3__AccessKey
                - name: S3_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: common-secrets
                      key: S3__SecretKey
                - name: S3_BUCKET
                  value: "vokimi-pg-backups"
                - name: S3_PREFIX
                  value: "auth"
                - name: POSTGRES_HOST
                  value: "postgres"
                - name: POSTGRES_PORT
                  value: "5432"
                - name: POSTGRES_DATABASE
                  value: "vokimi_auth_service_db"
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secrets
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secrets
                      key: POSTGRES_PASSWORD
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "10m"
                limits:
                  memory: "256Mi"
                  cpu: "100m"
---
