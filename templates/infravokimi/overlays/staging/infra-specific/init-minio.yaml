apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: minio-init
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: minio-init
    spec:
      restartPolicy: OnFailure

      initContainers:
        - name: wait-for-minio
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MinIO..."
              until curl -sf http://minio:9000/minio/health/ready; do
                sleep 3
              done
              echo "MinIO is ready!"

      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" &&
              mc mb --ignore-existing local/vokimi-storage &&
              echo '' | mc pipe local/vokimi-storage/common/default-user-profile-pic.webp &&
              echo '' | mc pipe local/vokimi-storage/common/default-voki-cover.webp &&
              for name in \
                basic-black \
                pets-marsita pets-ya-cat pets-zara pets-monika \
                boykisser-1 boykisser-2 boykisser-3 boykisser-4 \
                dasha-1 dasha-2 dasha-3 dasha-4; do
                echo '' | mc pipe "local/vokimi-storage/preset-profile-pics/${name}.webp"
              done &&
              echo "Bucket + structure ready"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: common-secrets
                  key: S3__AccessKey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: common-secrets
                  key: S3__SecretKey

