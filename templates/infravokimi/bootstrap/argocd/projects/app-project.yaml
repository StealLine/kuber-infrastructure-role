apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: vokimi
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Vokimi application project

  sourceRepos:
    - "*"

  destinations:
    - namespace: production-namespace
      server: https://kubernetes.default.svc
    - namespace: staging-*
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
      name: production-namespace
    - group: ""
      kind: Namespace
      name: staging-*


  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: policy
      kind: PodDisruptionBudget
    - group: networking.istio.io
      kind: VirtualService

  orphanedResources:
    warn: true
